spring.application.name=inptrental

# Enable H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Persisted H2 (keeps data between restarts)
spring.datasource.url=jdbc:h2:file:./data/testdb;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update


# JPA Hibernate (for schema auto-creation)
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JWT configuration
jwt.secret=Z1h3eVJXbHBJcTlpR1A5eE1iRzFqU2dBdVlWN2tEZ0U=
jwt.expiration=3600000


# Mail (example: Gmail SMTP; for dev you can use Mailtrap instead)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your.email@gmail.com
spring.mail.password=your_app_specific_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.from=Rental Service <your.email@gmail.com>

# existing H2 setup assumed present
logging.level.org.springframework.security=DEBUG
logging.level.com.inptrental.inptrental=DEBUG
